<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="tm-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b5cff"/>
      <stop offset="0.5" stop-color="#1e7bd6"/>
      <stop offset="1" stop-color="#00d6c0"/>
    </linearGradient>
    <radialGradient id="tm-core" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#eafbff"/>
      <stop offset="0.5" stop-color="#7fc6ff"/>
      <stop offset="1" stop-color="#13204a"/>
    </radialGradient>
  </defs>
  <!-- outer dial -->
  <circle cx="24" cy="24" r="21" fill="#0b1430" stroke="url(#tm-rim)" stroke-width="3"/>
  <!-- swirl arcs (the portal / time vortex) -->
  <path d="M24 7 A17 17 0 0 1 41 24" fill="none" stroke="url(#tm-rim)" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
  <path d="M41 24 A17 17 0 0 1 24 41" fill="none" stroke="#00d6c0" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M24 41 A17 17 0 0 1 7 24" fill="none" stroke="#9b5cff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- hour ticks -->
  <g stroke="#cfe3ff" stroke-width="1.5" stroke-linecap="round">
    <line x1="24" y1="11" x2="24" y2="14"/>
    <line x1="37" y1="24" x2="34" y2="24"/>
    <line x1="24" y1="37" x2="24" y2="34"/>
    <line x1="11" y1="24" x2="14" y2="24"/>
  </g>
  <!-- core + clock hands -->
  <circle cx="24" cy="24" r="8" fill="url(#tm-core)"/>
  <line x1="24" y1="24" x2="24" y2="17" stroke="#0b1430" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="29" y2="26" stroke="#0b1430" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="24" r="1.6" fill="#0b1430"/>
</svg>
