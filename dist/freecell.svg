<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect x="0" y="0" width="32" height="32" rx="3" fill="#1f7a3d"/>
  <!-- four free cells (top) -->
  <rect x="3" y="4" width="5" height="7" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <rect x="9" y="4" width="5" height="7" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <!-- foundation with K and ace -->
  <rect x="19" y="4" width="5" height="7" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <text x="20" y="9.5" font-size="4" font-family="serif" font-weight="bold" fill="#c00000">A</text>
  <rect x="25" y="4" width="5" height="7" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <!-- cascades -->
  <rect x="6" y="15" width="6" height="8" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <rect x="6" y="19" width="6" height="9" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <text x="7" y="26" font-size="4" font-family="serif" font-weight="bold" fill="#000">K</text>
  <rect x="20" y="15" width="6" height="8" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <rect x="20" y="19" width="6" height="9" rx="1" fill="#fff" stroke="#000" stroke-width="0.6"/>
  <text x="21" y="26" font-size="4" font-family="serif" font-weight="bold" fill="#c00000">Q</text>
</svg>
